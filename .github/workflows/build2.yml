name: Build 

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create build folder
        run: mkdir -p build

      - name: Clear the output file
        run: |
          rm -f build/output2.txt
          touch build/output2.txt

      - name: Download all subscriptions
        run: |
          while IFS= read -r url || [ -n "$url" ]; do
            if [ -z "$url" ]; then
              continue
            fi

            clean_url="${url%%#*}"
            echo "Checking $clean_url"

            http_status=$(curl -s -o /dev/null -w "%{http_code}" "$clean_url")

            if [ "$http_status" -ne 200 ]; then
              echo "Failed to reach $clean_url (HTTP status: $http_status), skipping..." >> build/output2.txt
              continue
            fi

            echo "Fetching $clean_url"

            curl -s --max-time 20 "$clean_url" -o tmp.txt || echo "skip $clean_url"

            if [ -s tmp.txt ]; then
              cat tmp.txt >> build/output2.txt
              echo "" >> build/output2.txt
            else
              echo "Empty or failed: $clean_url" >> build/output2.txt
            fi
          done < "$GITHUB_WORKSPACE/Jump.txt"

          rm -f tmp.txt

      - name: Remove duplicates and invalid configurations
        run: |
          grep -v -e "^$" -e "Empty or failed" -e "Failed to reach" build/output2.txt | sort -u > build/output_cleaned.txt
          mv build/output_cleaned.txt build/output2.txt

      - name: Commit and push
        run: |
          git config --global user.name "vpn-bot"
          git config --global user.email "vpn-bot@users.noreply.github.com"
          git add build/output2.txt
          git commit -m "Auto update VPN subscription (Jump)" || echo "No changes"
          git push || echo "Push failed"
