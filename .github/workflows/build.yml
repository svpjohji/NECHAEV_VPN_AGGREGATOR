name: Build VPN Subscription

on:
  schedule:
    - cron: "*/10 * * * *"  # каждые 10 минут
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Clear output file
        run: |
          mkdir -p build
          # Создаем пустой файл или очищаем существующий
          > build/output.txt

      - name: Collect subscriptions
        run: |
          mkdir -p build
          for file in NECHAEV_VPN/*; do
            [ -f "$file" ] || continue
            echo "Processing $file..."
            # Добавляем только непустые строки, строки с # внутри сохраняются
            grep -v '^\s*$' "$file" >> build/output.txt
          done
