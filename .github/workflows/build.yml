name: Build VPN Subscription

on:
  schedule:
    - cron: "*/10 * * * *"  # Каждые 10 минут
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create build folder
        run: mkdir -p build

      - name: Clear the output file
        run: |
          # Удаляем файл, если он существует
          rm -f build/output.txt
          # Создаем новый пустой файл
          touch build/output.txt

      - name: Download all subscriptions
        run: |
          while IFS= read -r url || [ -n "$url" ]; do
            if [ -z "$url" ]; then
              continue
            fi

            # Убираем комментарий после #
            clean_url="${url%%#*}"
            echo "Fetching $clean_url"

            # Скачиваем во временный файл
            curl -s --max-time 20 "$clean_url" -o tmp.txt || echo "skip $clean_url"

            # Если что-то есть, добавляем в output
            if [ -s tmp.txt ]; then
              cat tmp.txt >> build/output.txt
              echo "" >> build/output.txt
            else
              echo "Empty or failed: $clean_url"
            fi
          done < "$GITHUB_WORKSPACE/NECHAEV_VPN.txt"

          # Удаляем временный файл
          rm -f tmp.txt

      - name: Commit and push
        run: |
          git config --global user.name "vpn-bot"
          git config --global user.email "vpn-bot@users.noreply.github.com"
          git add build/output.txt
          git commit -m "Auto update VPN subscription" || echo "No changes"
          git push || echo "Push failed"
