name: Build VPN Subscription

on:
schedule:
- cron: "*/10 * * * *"  # Каждые 10 минут
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:  
  - name: Checkout repository  
    uses: actions/checkout@v3  

  - name: Create build folder  
    run: mkdir -p build  

  - name: Clear the output file  
    run: |  
      # Удаляем файл, если он существует  
      rm -f build/output.txt  
      # Создаем новый пустой файл  
      touch build/output.txt  

  - name: Download all subscriptions  
    run: |  
      while IFS= read -r url || [ -n "$url" ]; do  
        if [ -z "$url" ]; then  
          continue  
        fi  

        # Убираем комментарий после #  
        clean_url="${url%%#*}"  
        echo "Checking $clean_url"
