- name: Check proxies
  run: |
    echo "Checking proxies..."

    rm -f build/alive.txt
    touch build/alive.txt

    while IFS= read -r proxy; do
      if [ -z "$proxy" ]; then
        continue
      fi

      # вытаскиваем адрес и порт
      host=$(echo $proxy | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}')
      port=$(echo $proxy | grep -oE ':[0-9]+' | head -1 | tr -d ':')

      if [ -z "$host" ] || [ -z "$port" ]; then
        continue
      fi

      timeout 3 bash -c "</dev/tcp/$host/$port" 2>/dev/null

      if [ $? -eq 0 ]; then
        echo "$proxy" >> build/alive.txt
        echo "Alive: $host:$port"
      else
        echo "Dead: $host:$port"
      fi

    done < build/output.txt

    mv build/alive.txt build/output.txt
