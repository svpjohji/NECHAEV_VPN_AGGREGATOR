name: Sync output.txt to VK

on:
  schedule:
    - cron: "*/10 * * * *"  # каждые 10 минут
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Download output.txt from GitHub
        run: |
          curl -L https://raw.githubusercontent.com/ТВОЙ_РЕПО/main/output.txt -o output.txt

      - name: Upload to VK
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          GROUP_ID: ТВОЙ_ID_ГРУППЫ
        run: |
          curl -F "file=@output.txt" \
               -F "group_id=$GROUP_ID" \
               -F "access_token=$VK_TOKEN" \
               -F "v=5.131" \
               https://api.vk.com/method/docs.save
