name: Build Subscription

on:
  schedule:
    - cron: "*/10 * * * *" # каждые 10 минут
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create build folder
        run: mkdir -p build && echo "" > build/output.txt

      - name: Download subscriptions
        run: |
          while IFS= read -r url; do
            if [ -z "$url" ]; then
              continue
            fi
            echo "Fetching $url"
            curl -s --max-time 20 "$url" >> build/output.txt || echo "skip $url"
            echo "" >> build/output.txt
          done < "$GITHUB_WORKSPACE/NECHAEV_VPN.txt"

      - name: Remove duplicates
        run: sort -u build/output.txt -o build/output.txt || true

      - name: Commit and push
        run: |
          git config --global user.name "vpn-bot"
          git config --global user.email "vpn-bot@users.noreply.github.com"
          git add build/output.txt
          git commit -m "Auto update subscription" || echo "No changes"
          git push || echo "Push failed"
