name: NECHAEV-3

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create build folder
        run: mkdir -p build

      - name: Clear the output file
        run: |
          rm -f build/output4.txt
          touch build/output4.txt

      - name: Find source file
        id: find_jump
        run: |
          FILE=$(find $GITHUB_WORKSPACE -type f -iname "NECHAEV 2.txt" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "Source file not found"
            echo "file_path=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found file: $FILE"
          echo "file_path=$FILE" >> $GITHUB_OUTPUT

      - name: Download subscriptions
        if: steps.find_jump.outputs.file_path != ''
        run: |
          INPUT_FILE="${{ steps.find_jump.outputs.file_path }}"

          while IFS= read -r url || [ -n "$url" ]; do

            url=$(echo "$url" | xargs)

            if [ -z "$url" ]; then
              continue
            fi

            clean_url="${url%%#*}"
            clean_url=$(echo "$clean_url" | xargs)

            if [ -z "$clean_url" ]; then
              continue
            fi

            echo "Checking $clean_url"

            http_status=$(curl -s -o /dev/null -w "%{http_code}" "$clean_url")

            if [ "$http_status" != "200" ]; then
              echo "Failed: $clean_url (HTTP $http_status)" >> build/output4.txt
              continue
            fi

            echo "Fetching $clean_url"

            curl -L -s --max-time 20 "$clean_url" -o tmp.txt || true

            if [ -s tmp.txt ]; then
              cat tmp.txt >> build/output4.txt
              echo "" >> build/output4.txt
            else
              echo "Empty: $clean_url" >> build/output4.txt
            fi

          done < "$INPUT_FILE"

          rm -f tmp.txt

      - name: Remove duplicates
        run: |
          if [ -f build/output4.txt ]; then
            grep -v -e "^$" -e "Empty:" -e "Failed:" build/output4.txt | sort -u > build/output_cleaned.txt || true
            mv build/output_cleaned.txt build/output4.txt || true
          fi

      - name: Commit and push
        run: |
          git config --global user.name "vpn-bot"
          git config --global user.email "vpn-bot@users.noreply.github.com"

          git add build/output4.txt || true

          git commit -m "Auto update subscription" || echo "No changes"

          git push || echo "Push failed"
