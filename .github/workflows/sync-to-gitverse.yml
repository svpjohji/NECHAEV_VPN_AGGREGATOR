name: VPN Aggregator

on:
  schedule:
    - cron: "*/10 * * * *"  # каждые 10 минут
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Клонируем репозиторий
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2️⃣ Простой коммит и пуш в GitHub
      - name: Commit and Push to GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add build/output.txt
          git commit -m "Test commit"
          git push --force

      # 3️⃣ Зеркалим в Gitverse с force push
      - name: Mirror to Gitverse
        run: |
          git remote add gitverse https://${{ secrets.GITVERSE_TOKEN }}@gitverse.ru/Xalador/AutoConfig.git
          git push gitverse HEAD:main --force
