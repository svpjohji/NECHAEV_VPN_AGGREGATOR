name: Build VPN Subscription

on:
  schedule:
    - cron: "*/10 * * * *"  # каждые 10 минут по UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Клонируем репозиторий с полной историей
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2️⃣ Подготовка папок
      - name: Create build folder
        run: mkdir -p build

      # 3️⃣ Очистка файла
      - name: Clear the output file
        run: |
          rm -f build/output.txt
          touch build/output.txt

      # 4️⃣ Скачивание всех подписок
      - name: Download all subscriptions
        run: |
          while IFS= read -r url || [ -n "$url" ]; do
            if [ -z "$url" ]; then
              continue
            fi
            clean_url="${url%%#*}"
            echo "Checking $clean_url"
            http_status=$(curl -s -o /dev/null -w "%{http_code}" "$clean_url")
            if [ "$http_status" -ne 200 ]; then
              echo "Failed to reach $clean_url (HTTP status: $http_status), skipping..." >> build/output.txt
              continue
            fi
            echo "Fetching $clean_url"
            curl -s --max-time 20 "$clean_url" -o tmp.txt || echo "skip $clean_url"
            if [ -s tmp.txt ]; then
              cat tmp.txt >> build/output.txt
              echo "" >> build/output.txt
            else
              echo "Empty or failed: $clean_url" >> build/output.txt
            fi
          done < "$GITHUB_WORKSPACE/NECHAEV_VPN.txt"
          rm -f tmp.txt

      # 5️⃣ Очистка и удаление дубликатов
      - name: Remove duplicates and invalid configurations
        run: |
          grep -v -e "^$" -e "Empty or failed" -e "Failed to reach" build/output.txt | sort -u > build/output_cleaned.txt
          mv build/output_cleaned.txt build/output.txt

      # 6️⃣ Коммит и push в GitHub с уникальным сообщением
      - name: Commit and push to GitHub
        run: |
          git config --global user.name "vpn-bot"
          git config --global user.email "vpn-bot@users.noreply.github.com"
          git add build/output.txt
          git commit -m "Auto update VPN subscription: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push || echo "Push failed"

      # 7️⃣ Зеркалирование в Gitverse
      - name: Mirror to Gitverse
        run: |
          git remote add gitverse https://${{ secrets.GITVERSE_TOKEN }}@gitverse.ru/Xalador/AutoConfig.git
          git push gitverse HEAD:main --force
